<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Interlocking D and L mark for the Di Liu Lab">
  <rect width="64" height="64" rx="12" fill="#18202a"/>

  <!-- D strand -->
  <path
    d="M17 12V52M17 12H28C43 12 51 20 51 32C51 44 43 52 28 52H17"
    fill="none"
    stroke="#d75b82"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- L strand passes over the upper D -->
  <path
    d="M34 14V45H51"
    fill="none"
    stroke="#18202a"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M34 14V45H51"
    fill="none"
    stroke="#56c3ca"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Lower D curve returns over the L to complete the interlock -->
  <path
    d="M43 47C48 44 51 39 51 33"
    fill="none"
    stroke="#18202a"
    stroke-width="13"
    stroke-linecap="round"
  />
  <path
    d="M43 47C48 44 51 39 51 33"
    fill="none"
    stroke="#d75b82"
    stroke-width="8"
    stroke-linecap="round"
  />

  <!-- A single base-pair bridge keeps the nucleic-acid engineering cue -->
  <path d="M17 32H34" fill="none" stroke="#ffc627" stroke-width="5" stroke-linecap="round"/>
</svg>
