title: We welcome motivated scientists interested in rigorous, creative research.
introduction: Interested candidates are encouraged to contact Di to discuss potential research opportunities or collaborations.
positions:
  - title: Graduate students
    description: Prospective students excited by nucleic acid engineering, structural biology, chemical biology, and therapeutic design are encouraged to reach out and apply through ASU graduate programs.
  - title: Postdoctoral researchers
    description: The lab is seeking a postdoctoral researcher to lead RNA structure projects using cryo-EM. Prior cryo-EM experience is helpful but not required; scientific rigor and eagerness to learn are essential.
  - title: Undergraduate researchers
    description: Undergraduate positions are limited because each student receives close mentoring. Barrett Honors students interested in thesis work are especially encouraged to plan ahead.
contact_title: Send a concise note about your interests.
contact_text: Please include your background, the research direction that interests you, and relevant experience or goals. Attach a CV when appropriate.
